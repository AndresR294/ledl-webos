<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LEDL CORE v9.0</title>
    <style>
        /* RESET TOTAL PARA EVITAR AMONTONAMIENTO */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #0ff; font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* NAVBAR SUPERIOR: Siempre encima de todo */
        .master-nav { 
            background: #001a1a; border-bottom: 2px solid #0ff; padding: 10px; 
            display: flex; overflow-x: auto; gap: 8px; z-index: 9999; position: relative;
        }
        .core-btn { 
            background: #003333; border: 1px solid #0ff; color: #0ff; padding: 12px 18px; 
            font-size: 11px; font-weight: bold; border-radius: 4px; white-space: nowrap; flex-shrink: 0;
        }
        .core-btn:active { background: #0ff; color: #000; }

        /* PANEL CENTRAL: Área de Datos */
        #display-master { 
            flex: 1; padding: 15px; overflow-y: auto; background: #000; 
            border: 1px solid #333; margin: 5px; z-index: 10; position: relative;
        }
        .card { border: 1px solid #ffd700; background: rgba(255,215,0,0.05); padding: 15px; margin-top: 10px; }

        /* TERMINAL: Solo informativa */
        #term-info { 
            height: 90px; background: #050505; border-top: 1px solid #ffd700; 
            color: #ffd700; font-size: 10px; padding: 10px; overflow-y: auto; z-index: 100;
        }
    </style>
</head>
<body>

    <div class="master-nav">
        <button class="core-btn" onclick="exe('LOG')">📦 LOGÍSTICA VDR</button>
        <button class="core-btn" onclick="exe('PREV')">🛡️ PREVENTIVA</button>
        <button class="core-btn" onclick="exe('AUDIT')">🔍 AUDIT</button>
        <button class="core-btn" onclick="location.reload(true)" style="border-color:red; color:red;">🔒 RESET</button>
    </div>

    <div id="display-master">
        <div style="text-align: center; margin-top: 25%;">
            <h2 style="color:#fff; text-shadow: 0 0 10px #0ff;">CEREBRO_OPERATIVO@V9.0</h2>
            <p style="font-size:12px; color:#0ff;">WEBMASTER: J ANDRES RESENDEZ R</p>
            <p style="color:#ffd700; margin-top:15px; border:1px dashed #ffd700; padding:10px;">
                SISTEMA SINCRONIZADO: Toque un nodo superior.
            </p>
        </div>
    </div>

    <div id="term-info">[SYSTEM]: Nodo Valle del Roble Sincronizado...</div>

    <script>
        function exe(node) {
            const d = document.getElementById('display-master');
            const t = document.getElementById('term-info');
            t.innerHTML += `<br>[${new Date().toLocaleTimeString()}] Acceso: ${node}`;
            t.scrollTop = t.scrollHeight;

            if(node === 'LOG') {
                d.innerHTML = `<div class="card"><h3>📦 TARIFARIO LOGÍSTICO VDR</h3>
                <p style="margin-top:10px;">MATUTINO: <b style="color:#fff;">$35.00</b></p>
                <p>VESPERTINO: <b style="color:#fff;">$40.00</b></p>
                <p>NOCTURNO: <b style="color:#fff;">$50.00</b></p>
                <hr style="margin:10px 0; border:0; border-top:1px solid #333;">
                <p style="font-size:10px;">Actualización: Cerebro Operativo LEDL 2026</p></div>`;
            } else if(node === 'PREV') {
                d.innerHTML = `<div class="card"><h3>🛡️ ENSDELIZ PREVENTIVA</h3>
                <p style="margin-top:10px;">ESTADO: <span style="color:#0f0;">🟢 PROTEGIDO</span></p>
                <p>NODOS: 27 ACTIVOS</p>
                <p>AIKO: PRED_RUTAS [SYNC]</p></div>`;
            } else if(node === 'AUDIT') {
                d.innerHTML = `<div class="card"><h3>🔍 AUDIT & SYSTEM</h3>
                <p style="margin-top:10px;">ID: ORCID 0009-0007-3528-9413</p>
                <p>PROPIETARIO: J ANDRES RESENDEZ R</p>
                <p>UBICACIÓN: MONTERREY, MX</p></div>`;
            }
        }
    </script>
</body>
</html>
