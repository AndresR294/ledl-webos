<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LEDL CORE | V6.1</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: #00ffcc; font-family: monospace; height: 100vh; display: flex; flex-direction: column; }
        
        /* BARRA SUPERIOR FIJA */
        .header { background: #001a1a; border-bottom: 2px solid #0ff; padding: 10px; z-index: 1000; }
        .nav { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 5px; }
        .btn { background: #002222; border: 1px solid #00ffcc; color: #00ffcc; padding: 12px; font-size: 11px; white-space: nowrap; border-radius: 4px; flex-shrink: 0; }
        .btn:active { background: #00ffcc; color: #000; }

        /* ÁREA DE DATOS */
        .content { flex: 1; padding: 15px; overflow-y: auto; background: radial-gradient(circle, #001100 0%, #000 100%); border: 1px solid #333; margin: 5px; }
        .card { border: 1px solid #0ff; background: rgba(0,255,255,0.05); padding: 15px; margin-top: 10px; line-height: 1.6; }
        
        /* TERMINAL LOG */
        .term { height: 100px; background: #050505; border-top: 1px solid #ffd700; color: #ffd700; font-size: 10px; padding: 8px; overflow-y: auto; }
        
        .title { font-size: 14px; text-align: center; margin: 10px 0; color: #fff; text-shadow: 0 0 5px #0ff; }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 10px; color: #ffd700; margin-bottom: 5px;">📂 CEREBRO OPERATIVO LEDL</div>
        <div class="nav">
            <button class="btn" onclick="show('LOG')">📦 LOGÍSTICA VDR</button>
            <button class="btn" onclick="show('PREV')">🛡️ PREVENTIVA</button>
            <button class="btn" onclick="show('AUDIT')">🔍 AUDIT</button>
            <button class="btn" onclick="location.reload(true)" style="border-color: red; color: red;">🔒 RESET</button>
        </div>
    </div>

    <div class="content" id="view">
        <div style="text-align: center; opacity: 0.7; margin-top: 30%;">
            <div class="title">SISTEMA v6.1 ONLINE</div>
            <p>J ANDRES RESENDEZ R</p>
            <p>Pulse un botón de la barra superior para iniciar mapeo.</p>
        </div>
    </div>

    <div class="term" id="log">[SYSTEM]: Nodo Valle del Roble Sincronizado...</div>

    <script>
        function show(type) {
            const v = document.getElementById('view');
            const l = document.getElementById('log');
            l.innerHTML += `<br>[${new Date().toLocaleTimeString()}] Accediendo a ${type}...`;
            l.scrollTop = l.scrollHeight;

            if(type === 'LOG') {
                v.innerHTML = `<div class="card"><h3>📦 TARIFARIO VDR</h3>
                <p>MATUTINO: <b>$35.00</b></p>
                <p>VESPERTINO: <b>$40.00</b></p>
                <p>NOCTURNO: <b>$50.00</b></p></div>`;
            } else if(type === 'PREV') {
                v.innerHTML = `<div class="card"><h3>🛡️ ENSDELIZ PREVENTIVA</h3>
                <p>ESTADO: 🟢 ACTIVO</p>
                <p>NODOS: 27 PROTEGIDOS</p>
                <p>AIKO: PRED_RUTAS_INIT [OK]</p></div>`;
            } else if(type === 'AUDIT') {
                v.innerHTML = `<div class="card"><h3>🔍 AUDIT & SYSTEM</h3>
                <p>ORQUESTADOR: JARR</p>
                <p>ORCID: 0009-0007-3528-9413</p>
                <p>TEMP: 24°C</p></div>`;
            }
        }
    </script>
</body>
</html>
