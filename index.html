<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEDL CORE | V6.0_STABLE</title>
    <style>
        :root { --neon: #00ffcc; --ac: #0ff; --gold: #ffd700; --bg: #000; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; }
        
        /* BARRA SUPERIOR (MENÚ) */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; background: #001a1a; border-bottom: 2px solid var(--ac); display: flex; overflow-x: auto; z-index: 100; }
        .nav-item { padding: 15px; border-right: 1px solid var(--neon); white-space: nowrap; cursor: pointer; font-size: 0.75em; text-transform: uppercase; font-weight: bold; }
        .nav-item:active { background: var(--neon); color: #000; }
        
        /* CONTENEDOR PRINCIPAL */
        .main-container { margin-top: 60px; height: calc(100vh - 60px); display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; }
        
        /* ÁREA DE VISUALIZACIÓN */
        .display-area { flex-grow: 1; border: 1px solid #fff; background: radial-gradient(circle, #001a00 0%, #000 100%); padding: 15px; overflow-y: auto; position: relative; margin-bottom: 10px; }
        .data-card { background: rgba(0,255,204,0.05); border: 1px solid var(--ac); padding: 15px; margin-top: 10px; border-radius: 4px; }
        
        /* TERMINAL INFERIOR */
        .terminal { height: 80px; border: 1px solid var(--gold); background: #010101; padding: 10px; font-size: 0.65em; overflow-y: auto; color: var(--gold); }
        
        h3 { margin-top: 0; color: #fff; border-bottom: 1px solid var(--gold); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-item" onclick="openNode('PREVENTIVA')">📁 PREVENTIVA</div>
        <div class="nav-item" onclick="openNode('LOGISTICA')">📦 LOGÍSTICA VDR</div>
        <div class="nav-item" onclick="openNode('AUDIT')">🛡️ AUDIT</div>
        <div class="nav-item" onclick="location.reload()" style="color:red;">🔒 LOGOUT</div>
    </nav>

    <div class="main-container">
        <section class="display-area" id="screen">
            <div style="text-align: center; margin-top: 20%;">
                <h2 id="core-status">CEREBRO_OPERATIVO@V6.0</h2>
                <p>ORQUESTADOR: J ANDRES RESENDEZ R</p>
                <p style="color:var(--gold)">Seleccione una categoría en la barra superior.</p>
            </div>
        </section>

        <footer class="terminal" id="log">
            [SYSTEM]: Nodo Central Sincronizado. Esperando comandos...
        </footer>
    </div>

    <script>
        const screen = document.getElementById('screen');
        const log = document.getElementById('log');

        function updateLog(msg) {
            log.innerHTML += `<br>[${new Date().toLocaleTimeString()}] ${msg}`;
            log.scrollTop = log.scrollHeight;
        }

        function openNode(type) {
            updateLog(`Acceso a Nodo: ${type}...`);
            
            if(type === 'LOGISTICA') {
                screen.innerHTML = `
                    <h3>📦 VALLE DEL ROBLE LOGISTICS</h3>
                    <div class="data-card">
                        <p>TARIFARIO FIJO ACTUALIZADO:</p>
                        <p>🌅 MATUTINO: <b>$35.00</b></p>
                        <p>🌆 VESPERTINO: <b>$40.00</b></p>
                        <p>🌃 NOCTURNO: <b>$50.00</b></p>
                        <hr>
                        <p style="font-size:0.7em;">Comisión ajustada según LEDL 2026.</p>
                    </div>`;
            } else if(type === 'PREVENTIVA') {
                screen.innerHTML = `
                    <h3>🛡️ MODULO ENSDELIZ PREVENTIVA</h3>
                    <div class="data-card">
                        <p>ESTADO: <span style="color:#0f0;">🟢 ACTIVO</span></p>
                        <p>ESCANEO: 27 NODOS OPERATIVOS</p>
                        <p>FILTRO: PREDICCIÓN DE RUTAS ACTIVADA</p>
                    </div>`;
            } else if(type === 'AUDIT') {
                screen.innerHTML = `
                    <h3>🛡️ AUDIT & SYSTEM</h3>
                    <div class="data-card">
                        <p>USUARIO: J ANDRES RESENDEZ R</p>
                        <p>ID: ORCID 0009-0007-3528-9413</p>
                        <p>SISTEMA: ENSDELIZ® CORE</p>
                    </div>`;
            }
        }
    </script>
</body>
</html>
