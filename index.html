<!DOCTYPE html>
<html lang="es-MX">
<head>

        .logo-ledl { width: 120px; height: 120px; border: 2px solid #d4af37; border-radius: 50%; padding: 10px; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }

</head>

    <script>
        let timer;
        const TELEGRAM_TOKEN = "8512593184:AAEXhOsMTjfnUOus5AkLS58q-py03lq2jlA";
        const CHAT_ID = "8486738889";

        function startTimer() {
            timer = setTimeout(() => {
                invocarNodo();
            }, 3000); // 3 SEGUNDOS DE PULSACIÓN PARA INVOCAR

        function clearTimer() {

        }
    </script>
