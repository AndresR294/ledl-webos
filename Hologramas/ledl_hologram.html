<!DOCTYPE html>
<html><head><title>LEDL HOLOGRAPHIC CORE</title>
<style>body{background:#000;color:#0ff;font-family:monospace;overflow:hidden;}
.point{position:absolute;width:4px;height:4px;background:#0ff;box-shadow:0 0 8px #0ff;border-radius:50%;transition:2s;}</style></head>
<body><h2>🧠 CAMPO HOLOGRÁFICO Ψ_LEDL</h2><div id="field"></div>
<script>for(let i=0;i<150;i++){let p=document.createElement("div");p.className="point";

</body></html>
